<!DOCTYPE html>
<html>

<head>

<title>SnowPro Advanced Exam Simulator</title>

<style>

body{
font-family:Arial;
background:#f3f6fb;
padding:20px;
}

.container{
max-width:950px;
margin:auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 12px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

#timer{
font-size:20px;
color:red;
text-align:right;
}

.question{
font-size:20px;
margin-top:20px;
}

.option{
margin:8px 0;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
background:#1976d2;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.hint{
display:none;
background:#eef3ff;
padding:10px;
margin-top:10px;
border-left:4px solid #1976d2;
}

.flag{
color:orange;
font-weight:bold;
}

#dashboard{
margin-top:20px;
padding:20px;
background:#f8f8f8;
}

</style>

</head>

<body>

<div class="container">

<h1>SnowPro Certification Simulator</h1>

<div id="timer"></div>

<div id="progress"></div>

<div class="question" id="question"></div>

<div id="options"></div>

<button onclick="toggleHint()">Hint</button>
<button onclick="flagQuestion()">Flag</button>

<div class="hint" id="hint"></div>

<br>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>

<button onclick="reviewExam()">Review</button>

<button onclick="submitExam()">Submit Exam</button>

<div id="dashboard"></div>

</div>

<script>

const QUESTION_COUNT = 100;
const EXAM_TIME = 90*60;

let questions = [];
let examQuestions = [];

let current=0;

let answers = {};
let flagged = [];

function shuffle(array){
return array.sort(()=>Math.random()-0.5)
}

/* ---------------------- QUESTION BANK ---------------------- */

questions = [

{
q:"What is Snowflake’s architecture advantage?",
options:[
"Shared storage",
"Separation of compute and storage",
"Single compute cluster",
"Local database architecture"
],
a:1,
hint:"Snowflake scales compute independently.",
ex:"Snowflake separates compute from storage allowing independent scaling."
},

{
q:"Which command loads data into tables?",
options:[
"COPY INTO",
"LOAD DATA",
"IMPORT",
"PUT INTO"
],
a:0,
hint:"Main ingestion SQL command.",
ex:"COPY INTO loads staged files into tables."
},

{
q:"What feature tracks DML changes?",
options:[
"Streams",
"Stages",
"Tasks",
"Pipes"
],
a:0,
hint:"Used for CDC pipelines.",
ex:"Streams record inserts, updates, deletes."
},

{
q:"Result cache lifetime?",
options:[
"12h",
"24h",
"48h",
"7 days"
],
a:1,
hint:"Default query cache retention.",
ex:"Snowflake caches results for 24 hours."
},

{
q:"Which command stages files from local machine?",
options:[
"PUT",
"GET",
"COPY",
"UPLOAD"
],
a:0,
hint:"SnowSQL command.",
ex:"PUT uploads files to internal stages."
},

{
q:"Which object automates pipelines?",
options:[
"Streams",
"Tasks",
"Stages",
"Pipes"
],
a:1,
hint:"Scheduler inside Snowflake.",
ex:"Tasks automate SQL execution."
},

{
q:"Which datatype stores JSON?",
options:[
"JSON",
"VARIANT",
"OBJECT",
"ARRAY"
],
a:1,
hint:"Snowflake universal semi-structured type.",
ex:"VARIANT supports JSON, Avro, XML."
},

{
q:"What feature enables continuous ingestion?",
options:[
"Streams",
"Snowpipe",
"Tasks",
"Stages"
],
a:1,
hint:"Event-driven loading.",
ex:"Snowpipe automatically loads new files."
},

{
q:"Fail-safe duration?",
options:[
"1 day",
"7 days",
"30 days",
"90 days"
],
a:1,
hint:"Fixed recovery period.",
ex:"Fail-safe provides 7-day disaster recovery."
},

{
q:"What command shows warehouses?",
options:[
"LIST WAREHOUSE",
"SHOW WAREHOUSES",
"DESCRIBE WH",
"DISPLAY WAREHOUSE"
],
a:1,
hint:"Standard Snowflake metadata command.",
ex:"SHOW WAREHOUSES returns warehouse metadata."
}

];

/* expand bank to 200 */

while(questions.length < 200){
questions.push({...questions[questions.length % 10]})
}

/* randomize exam */

examQuestions = shuffle(questions).slice(0,QUESTION_COUNT);

function loadQuestion(){

let q = examQuestions[current];

document.getElementById("question").innerHTML =
(current+1)+". "+q.q;

document.getElementById("progress").innerHTML =
"Question "+(current+1)+" / "+QUESTION_COUNT;

let html="";

q.options.forEach((o,i)=>{

html+=`
<div class="option">
<label>
<input type="radio" name="opt" value="${i}"
${answers[current]==i?"checked":""}>
${o}
</label>
</div>
`;

});

document.getElementById("options").innerHTML=html;

document.getElementById("hint").innerHTML=q.hint;

}

function saveAnswer(){
let sel=document.querySelector('input[name="opt"]:checked');
if(sel) answers[current]=parseInt(sel.value)
}

function nextQuestion(){
saveAnswer();
if(current<QUESTION_COUNT-1){
current++
loadQuestion()
}
}

function prevQuestion(){
saveAnswer();
if(current>0){
current--
loadQuestion()
}
}

function toggleHint(){
let h=document.getElementById("hint")
h.style.display = h.style.display=="block"?"none":"block"
}

function flagQuestion(){

if(!flagged.includes(current))
flagged.push(current)

alert("Question flagged for review")
}

function reviewExam(){

let review="Flagged Questions:<br>"

flagged.forEach(q=>{
review+="Question "+(q+1)+"<br>"
})

document.getElementById("dashboard").innerHTML=review

}

function submitExam(){

saveAnswer()

let correct=0

examQuestions.forEach((q,i)=>{
if(answers[i]==q.a) correct++
})

let percent=Math.round(correct/QUESTION_COUNT*100)

let dashboard = `
<h2>Exam Results</h2>
Score: ${correct} / ${QUESTION_COUNT} (${percent}%)

<h3>Explanation Review</h3>
`

examQuestions.forEach((q,i)=>{

dashboard+=`
<p>
<b>Q${i+1}</b> ${q.q}<br>
Correct: ${q.options[q.a]}<br>
Explanation: ${q.ex}
</p>
`
})

document.getElementById("dashboard").innerHTML = dashboard

}

/* TIMER */

let time=EXAM_TIME

setInterval(()=>{

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerHTML=
"Time: "+m+":"+(s<10?"0"+s:s)

time--

if(time<=0)
submitExam()

},1000)

loadQuestion()

</script>

</body>
</html>
